# Site settings
# baseurl = "http://localhost:1313/"
languageCode = "en-us"
title = "Meexle — AI Engineering for Healthcare"
theme = "hugo-agency-theme"


[params]

	name = "Sergei Emelianov"
	description = "Meexle is an AI engineering and data protection company focused on healthcare. We design, build, and operate HIPAA-compliant AI systems that help clinical organizations improve outcomes, automate workflows, and protect sensitive health data."
	email = "meexle@meexle.com"


	# Navigation
	[params.navigation]
		brand = "Meexle"
		synctool = "Services"
		about = "Process"
		example = "Ecosystem"
		contact = "Contact"


	# Hero section
	[params.hero]
		# To change the background image of the hero, replace 'header-bg.jpg' in
		# the 'static/img' folder.
		title = "AI Engineering for Healthcare"
		subtitle = "AI solutions for clinical organizations"
		buttonText = "Work With Us"


	# Services section
	[params.synctool]
		title = "What We Do"
		subtitle = "We build AI systems that healthcare organizations can trust — engineered for clinical accuracy, protected by design, and compliant by default."

		[[params.synctool.list]]
			icon = "fa-line-chart"
			title = "Predictive Analytics & Forecasting"
			description = "Turn historical patient and operational data into clinical foresight. We build ML models for readmission risk, patient deterioration, population health stratification, and revenue forecasting — deployed directly where your clinicians and administrators work."

		[[params.synctool.list]]
			icon = "fa-sitemap"
			title = "AI Agents & Integrations"
			description = "We design and deploy autonomous AI agents that act inside your existing clinical systems — handling triage, prior authorization, appointment scheduling, documentation, and cross-system data orchestration. Purpose-built integrations with EHR, EMR, and health data platforms."

		[[params.synctool.list]]
			icon = "fa-cogs"
			title = "Model Fine-Tuning"
			description = "General-purpose LLMs don't understand your clinical context. We fine-tune foundation models on your organization's proprietary health data — producing models that speak your specialty, reflect your protocols, and perform on your patient population."

		[[params.synctool.list]]
			icon = "fa-shield"
			title = "Health Data Protection"
			description = "End-to-end protection for Protected Health Information. We implement HIPAA-compliant data pipelines, PHI de-identification, encryption at rest and in transit, and comprehensive audit trails across every system that touches patient data."

		[[params.synctool.list]]
			icon = "fa-stethoscope"
			title = "Clinical NLP"
			description = "We extract structured intelligence from unstructured clinical text — EHR notes, discharge summaries, radiology reports, and medical records — using NLP models purpose-built for healthcare language and terminology."

		[[params.synctool.list]]
			icon = "fa-certificate"
			title = "Compliance & AI Governance"
			description = "We embed regulatory compliance into every layer of your AI system. From HIPAA and HITRUST to SOC 2 and emerging AI governance standards — every model we deliver is auditable, explainable, and defensible."

    # About section
	[params.about]
		title = "How We Work"
		subtitle = "A clear, collaborative process — from first conversation to production AI"
		endpoint = "Better<br>Health<br>Outcomes"

		# The events will be listed from the top to the bottom.
		# All images are stored under 'static/img/about'.
		# Replace them with your own.
		[[params.about.events]]
			img = "1.png"
			title = "Discover"
			description = "We start by understanding your clinical environment, data infrastructure, and goals. Together we identify the highest-value AI opportunities and define success criteria."

		[[params.about.events]]
			img = "2.png"
			title = "Design & Build"
			description = "Our engineers design a HIPAA-compliant AI architecture tailored to your organization. We build, test, and validate every component against clinical and regulatory requirements."

		[[params.about.events]]
			img = "3.png"
			title = "Deploy & Protect"
			description = "We deploy your AI system into production, integrate it with existing clinical workflows, and establish continuous monitoring, governance, and data protection protocols."


	# Technology Ecosystem section
	[params.example]
		title = "Technology Ecosystem"
		subtitle = "We build on the leading HIPAA-eligible cloud and AI platforms"
		description = "Our solutions integrate with the AI infrastructure your organization already relies on — or the best-fit platform for your needs."

		[[params.example.members]]
			img = "amazon-aws.png"
			name = "AWS HealthLake"
			position = "HIPAA-eligible health data lake with native FHIR support and Amazon SageMaker AI/ML capabilities"

		[[params.example.members]]
			img = "snowflake.svg"
			name = "Snowflake"
			position = "Cloud data platform for secure health data sharing, analytics, and AI/ML pipelines at scale"

		[[params.example.members]]
			img = "azure-ai-foundry.svg"
			name = "Azure AI Foundry"
			position = "Microsoft's enterprise AI platform for building, deploying, and governing healthcare AI solutions"

	# Contact section
	[params.contact]
		title = "Contact us"
		subtitle  = "We are open to comments and questions."
		buttonText = "Send message"

		# 'warning' defines error messages for invalid inputs
		[params.contact.form.fname]
			text = "Your First Name *"
			warning = "Please enter your fisrt name."
		
		[params.contact.form.lname]
			text = "Your Last Name *"
			warning = "Please enter your last name."

		[params.contact.form.company]
			text = "Company"
			warning = "Please enter your company name."

		[params.contact.form.email]
			text = "Your Email *"
			warning = "Please enter your email address."

		[params.contact.form.phone]
			text = "Your Phone"
			warning = "Please enter your phone number."

		[params.contact.form.message]
			text = "Your Message *"
			warning = "Please enter a message."


	# Footer section
	[params.footer]
		copyright = "Meexle.com"
		

		[[params.footer.quicklinks]]
			text = "Privacy Policy"
			link = "#"

		[[params.footer.quicklinks]]
			text = "Terms of Use"
			link = "#"
